plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id "com.adarshr.test-logger" version "4.0.0"
}

compileJava.options.encoding = "UTF-8"
compileJava.options.compilerArgs += '-Xlint:unchecked'
compileTestJava.options.encoding = "UTF-8"

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

java {
    withSourcesJar()
    withJavadocJar()
}

version = "${version}"
group = "${groupId}"

jar {
    dependsOn 'generatePomFileForMavenPublication'

    into("META-INF/maven/com.newline53/newline-java-sdk") {
        from(layout.buildDirectory.file("pom.xml")) {
            // Only include if it exists to avoid build ordering issues
            duplicatesStrategy = DuplicatesStrategy.INCLUDE
        }
    }
}

javadoc {
    options.encoding = "UTF-8"

    if(JavaVersion.current().isJava9Compatible()) {
        options.addBooleanOption('html5', true)
    }
    options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.withType(Javadoc).configureEach {
  failOnError = false
  options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.withType(JavaCompile).configureEach {
    options.release = 11
}

sourcesJar {
    archiveBaseName = "${artifactId}"
}

javadocJar {
    archiveBaseName = "${artifactId}"
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

testlogger  {
    showStandardStreams = true
}

test {    
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
    finalizedBy 'mergeJUnitReports'
}

configurations {
    antJUnit
}

task mergeJUnitReports {
    ext {
        resultsDir = file("$buildDir/test-results/test")
        targetDir = file(".speakeasy/reports")
    }

    doLast {
        ant.taskdef(
            name: 'junitreport',
            classname: 'org.apache.tools.ant.taskdefs.optional.junit.XMLResultAggregator',
            classpath: configurations.antJUnit.asPath
        )

        mkdir targetDir

        ant.junitreport(todir: targetDir, tofile: 'tests.xml') {
            fileset(dir: resultsDir, includes: 'TEST-*.xml')
        }
    }
}


dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-core:2.18.6'
    api 'com.fasterxml.jackson.core:jackson-annotations:2.18.6'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.6'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.6'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.18.6'
    antJUnit 'org.apache.ant:ant-junit:1.9.16'
    api('org.openapitools:jackson-databind-nullable:0.2.6') {exclude group: 'com.fasterxml.jackson.core', module: 'jackson-databind'}
    implementation 'commons-io:commons-io:2.18.0'
    implementation 'jakarta.annotation:jakarta.annotation-api:3.0.0'
    api 'org.slf4j:slf4j-api:2.0.9'
    testImplementation 'org.slf4j:slf4j-simple:2.0.9'
    api 'org.reactivestreams:reactive-streams:1.0.4'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testImplementation 'org.mockito:mockito-core:5.14.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.11.4'
}

ext {
    publishingConfig = [
        groupId: group,
        artifactId: artifactId,
        version: version,
        name: "Newline by Fifth Third Java SDK",
        description: "SDK enabling Java developers to easily integrate with the Newline by Fifth Third API.",
        publicationName: "maven"
    ]
}

apply from: 'publishing.gradle'

apply from: 'build-extras.gradle'